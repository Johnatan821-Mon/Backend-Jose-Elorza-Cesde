name: CD — Deploy to VPS

# Se dispara automáticamente cuando el workflow CI completa con éxito en main
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Calcular tag de imagen
        id: image
        run: |
          SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "full=ghcr.io/${REPO}:sha-${SHA}" >> $GITHUB_OUTPUT

      - name: Deploy por SSH al VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Los secrets se inyectan como variables de entorno — nunca inline en el script
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          APP_IMAGE: ${{ steps.image.outputs.full }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,APP_IMAGE
          script: |
            set -e
            cd ~/app   # <-- ajusta a la ruta donde está el proyecto en el VPS

            echo "==> Actualizando código ..."
            git pull origin main

            echo "==> Autenticando en GHCR ..."
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            echo "==> Descargando imagen ${APP_IMAGE} ..."
            APP_IMAGE="${APP_IMAGE}" docker compose -f docker-compose.prod.yml pull app

            echo "==> Reiniciando app ..."
            APP_IMAGE="${APP_IMAGE}" docker compose -f docker-compose.prod.yml up -d --no-deps app

            echo "==> Limpiando imágenes antiguas ..."
            docker image prune -f

            echo "==> Estado:"
            docker compose -f docker-compose.prod.yml ps

      - name: Notificar resultado
        if: failure()
        run: |
          echo "Deploy fallido para imagen ${{ steps.image.outputs.full }}"
          echo "Revisar los logs del paso SSH para más detalles."
          exit 1
