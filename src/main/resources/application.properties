spring.application.name=clientes

# Perfil por defecto: dev. En produccion usar variable de entorno SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.open-in-view=false

# JWT — en prod, sobreescribir JWT_SECRET con un valor seguro de al menos 32 chars
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Google Calendar — deshabilitado por defecto; activar solo en prod con credenciales reales
google.calendar.enabled=${GOOGLE_CALENDAR_ENABLED:false}
google.calendar.application-name=Clientes App
google.calendar.timezone=${GOOGLE_CALENDAR_TIMEZONE:America/Bogota}
