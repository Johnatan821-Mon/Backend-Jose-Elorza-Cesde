# ===================================================================
# PERFIL TEST — H2 en memoria, aislado del perfil dev
# Se activa con @ActiveProfiles("test") en los tests
# ===================================================================

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Secreto JWT fijo para tests — no usar en producción
jwt.secret=74657374696e672d736563726574406a6f7267656c6f727a612d323032352121

# Google Calendar siempre deshabilitado en tests
google.calendar.enabled=false

# Actuator deshabilitado en tests para no interferir con el contexto
management.endpoints.web.exposure.include=
