# ===================================================================
# PERFIL PROD — PostgreSQL con variables de entorno
# Activar con: SPRING_PROFILES_ACTIVE=prod
# Todas las variables ${...} deben estar definidas en el entorno
# ===================================================================

# Base de datos — nunca hardcodear credenciales aqui
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Google Calendar — activar con credenciales reales
google.calendar.credentials-file=${GOOGLE_CALENDAR_CREDENTIALS_FILE:credentials.json}
google.calendar.calendar-id=${GOOGLE_CALENDAR_ID:primary}

# HikariCP — pool de conexiones para producción
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Actuator — en prod mostrar detalles solo a usuarios autenticados
management.endpoint.health.show-details=when-authorized
