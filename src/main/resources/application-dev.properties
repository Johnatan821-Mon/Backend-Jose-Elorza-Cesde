# ===================================================================
# PERFIL DEV — H2 en memoria con compatibilidad PostgreSQL
# Se activa automaticamente al arrancar sin SPRING_PROFILES_ACTIVE
# ===================================================================

# H2 en modo PostgreSQL para que Flyway use el mismo SQL que en produccion
spring.datasource.url=jdbc:h2:mem:clientesdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate valida el esquema (Flyway lo crea, Hibernate no toca DDL)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — aplica las migraciones V1..Vn al arrancar
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
