services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-clientesdb}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME es requerido en .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es requerido en .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME:-clientesdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # APP_IMAGE: imagen de GHCR publicada por CI (ghcr.io/owner/repo:sha-xxxxx)
    # Si no se define, usa build local como fallback.
    image: ${APP_IMAGE:-clientes-api:latest}
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Sobrescribe DB_URL para que apunte al servicio postgres del compose
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-clientesdb}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - app-network

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - ./data/certbot/www:/var/www/certbot
      - ./data/certbot/conf:/etc/letsencrypt
    # Renueva el certificado automáticamente cada 12 horas
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
