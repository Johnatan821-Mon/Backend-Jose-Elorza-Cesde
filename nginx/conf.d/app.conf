# Reemplaza TU_DOMINIO.COM con tu dominio real en todas las líneas de este archivo.
# Ejemplo: api.miempresa.com

server {
    listen 80;
    server_name TU_DOMINIO.COM;

    # Ruta para el desafío ACME de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás redirige a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name TU_DOMINIO.COM;

    # Certificados generados por Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.COM/privkey.pem;

    # Configuración SSL segura (TLS 1.2 y 1.3 únicamente)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Cabeceras de seguridad HTTP
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Límite de tamaño de petición (ajusta según necesidad)
    client_max_body_size 10M;

    # Proxy inverso hacia el contenedor Spring Boot
    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
